<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple carousel · example</title>
    <style>
        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0eaff;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #b9a6dd;
            text-align: center;
        }

        h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #a58bd4 #e5d9ff;
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #e5d9ff;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #a58bd4;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #7a62b5;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #9d87cf;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .carousel-slider {
            margin-top: 1.8rem;
            color: #4a3977;
            background: #eee5ff;
            padding: 0.8rem 1.2rem;
            border-radius: 3rem;
            font-size: 1rem;
        }

            .carousel-slider a{
                text-decoration: none;
                font-weight: bold;
            }
        
        .carousel-scroll {
            display: flex;
            justify-content: center;
            gap: 0.5rem;

        }
    
    </style>
</head>
<body>
    <div class="card">
        <h2>Hinata Shoyo</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item" id="slide1"><img src="https://media.tenor.com/6dOf85BKov0AAAAM/haikyuu-anime.gif"alt="Haikyu"> </div>
            <div class="carousel-item" id="slide2"><img src="https://media1.tenor.com/m/iB3qU13UIDQAAAAd/haikyuu-hinata-shoyo.gif"alt="Haikyu"></div>
            <div class="carousel-item" id="slide3"><img src="https://media1.tenor.com/m/aWtgpy8FmXAAAAAd/haikyuu-hinata-shouyou.gif"alt="Haikyu"></div>
            <div class="carousel-item" id="slide4"><img src="https://media1.tenor.com/m/e7jVZGRsbtwAAAAC/anime-haikyuu.gif"alt="Haikyu"></div>
            <div class="carousel-item" id="slide5"><img src="https://media1.tenor.com/m/iB3qU13UIDQAAAAC/haikyuu-hinata-shoyo.gif"alt="Haikyu"></div>
            <div class="carousel-item" id="slide6"><img src="https://media1.tenor.com/m/Y5QHEzrZoTgAAAAd/hinata-volleyball.gif"alt="Haikyu"></div>
        </div>
    <div class="carousel-scroll">
        <div class="carousel-slider"><a href="#slide1">Slide 1</a></div>
        <div class="carousel-slider"><a href="#slide2">Slide 2</a></div>
        <div class="carousel-slider"><a href="#slide3">Slide 3</a></div>
        <div class="carousel-slider"><a href="#slide4">Slide 4</a></div>
        <div class="carousel-slider"><a href="#slide5">Slide 5</a></div>
        <div class="carousel-slider"><a href="#slide6">Slide 6</a></div>
        </div>
        

        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#3c2d66; background:#f3ecff; padding:0.6rem; border-radius:3rem;">
            ✔️ <code>display: flex</code> + <code>overflow-x: auto</code> + <code>scroll-snap-type</code>
        </p>
    </div>
</body>
</html>
